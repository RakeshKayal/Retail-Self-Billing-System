name: Deploy to EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Upload files to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MY_HOST }}
          username: ubuntu
          key: ${{ secrets.MY_KEY }}

          source: "."

          target: "/home/ubuntu/deploy"
          script: |
            sudo rsync -av --delete /home/ubuntu/deploy/ /opt/lampp/htdocs/
          debug: true
